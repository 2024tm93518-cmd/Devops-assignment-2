apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-v1
spec:
  replicas: 4
  selector:
    matchLabels:
      version: v1
  template:
    metadata:
      labels:
        app: aceest
        version: v1
    spec:
      containers:
      - name: aceest
        image: shruthis93518/devops-assignment-2:v1
        ports:
        - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      version: v2
  template:
    metadata:
      labels:
        app: aceest
        version: v2
    spec:
      containers:
      - name: aceest
        image: shruthis93518/devops-assignment-2:v2
        ports:
        - containerPort: 5000
