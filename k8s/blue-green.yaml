apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      version: blue
  template:
    metadata:
      labels:
        app: aceest
        version: blue
    spec:
      containers:
      - name: aceest
        image: shruthis93518/devops-assignment-2:v1
        ports:
        - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-green
spec:
  replicas: 2
  selector:
    matchLabels:
      version: green
  template:
    metadata:
      labels:
        app: aceest
        version: green
    spec:
      containers:
      - name: aceest
        image: shruthis93518/devops-assignment-2:v2
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-bg-service
spec:
  type: NodePort
  selector:
    version: blue
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30008
