apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-a
spec:
  replicas: 2
  selector:
    matchLabels:
      version: a
  template:
    metadata:
      labels:
        app: aceest
        version: a
    spec:
      containers:
      - name: aceest
        image: shruthis93518/devops-assignment-2:v1
        ports:
        - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-b
spec:
  replicas: 2
  selector:
    matchLabels:
      version: b
  template:
    metadata:
      labels:
        app: aceest
        version: b
    spec:
      containers:
      - name: aceest
        image: shruthis93518/devops-assignment-2:v2
        ports:
        - containerPort: 5000
