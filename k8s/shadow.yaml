apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-shadow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-shadow
  template:
    metadata:
      labels:
        app: aceest-shadow
    spec:
      containers:
      - name: aceest-shadow
        image: shruthis93518/devops-assignment-2:v2
        ports:
        - containerPort: 5000
